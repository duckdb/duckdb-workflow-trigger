name: DuckDB Workflow Trigger
on:
  workflow_dispatch:
    inputs:
      # Git ref of the duckdb repo
      duckdb-ref:
        required: true
        type: string
      trigger-nightly:
        required: true
        type: boolean
  schedule:
    - cron: "17 0 * * *"
    - cron: "30 9 * * 1-5"
    - cron: "30 10 * * 1-5"

jobs:
  build-linux:
    runs-on: ubuntu-latest

    env:
      PAT_USER: ${{ secrets.PAT_USER }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

    steps:
    - uses: actions/checkout@v6

    - name: Config
      id: config
      env:
        EVENT_NAME: ${{ github.event_name }}
        EVENT_SCHEDULE: ${{ github.event.schedule }}
        TRIGGER_NIGHTLY: ${{ github.event.inputs.trigger-nightly }}
      run: |
        set -euo pipefail

        run_nightly=false
        if [[ "$EVENT_NAME" == "schedule" && "$EVENT_SCHEDULE" == "17 0 * * *" ]]; then
          run_nightly=true
        elif [[ "$EVENT_NAME" == "workflow_dispatch" && "$TRIGGER_NIGHTLY" == "true" ]]; then
          run_nightly=true
        fi

        run_cache_warmup=false
        if [[ "$EVENT_NAME" == "schedule" && ( "$EVENT_SCHEDULE" == "30 9 * * 1-5" || "$EVENT_SCHEDULE" == "30 10 * * 1-5" ) ]]; then
          ams_offset="$(TZ=Europe/Amsterdam date '+%z')"
          case "$EVENT_SCHEDULE" in
            "30 9 * * 1-5")
              # 09:30 UTC should correspond to 11:30 in CEST (+0200).
              [[ "$ams_offset" == "+0200" ]] && run_cache_warmup=true
              ;;
            "30 10 * * 1-5")
              # 10:30 UTC should correspond to 11:30 in CET (+0100).
              [[ "$ams_offset" == "+0100" ]] && run_cache_warmup=true
              ;;
          esac
        fi

        echo "run_nightly=$run_nightly" >> "$GITHUB_OUTPUT"
        echo "run_cache_warmup=$run_cache_warmup" >> "$GITHUB_OUTPUT"

    - name: Warmup cache for workflow Main
      if: ${{ fromJSON(steps.config.outputs.run_cache_warmup) }}
      run: |
        set -euo pipefail

        branch="main"
        ./trigger.sh duckdb "$(printf '{"ref":"refs/heads/%s","inputs":{"skip_tests":"true"}}' "$branch")" Main.yml

    - name: Checkout DuckDB upstream repository
      if: ${{ fromJSON(steps.config.outputs.run_nightly) }}
      uses: actions/checkout@v6
      with:
        repository: duckdb/duckdb
        fetch-depth: 0
        path: duckdb-upstream

    - name: Discover changed DuckDB branches (last 48h)
      id: changed-branches
      if: ${{ fromJSON(steps.config.outputs.run_nightly) }}
      run: |
        set -euo pipefail

        repo_dir="duckdb-upstream"
        git -C "$repo_dir" fetch --prune origin "+refs/heads/*:refs/remotes/origin/*"

        now_epoch="$(date -u +%s)"
        cutoff_epoch="$((now_epoch - 48 * 60 * 60))"

        changed_file="$(mktemp)"
        candidates=0
        changed=0

        echo "Scanning DuckDB branches for updates in the last 48 hours..."
        while IFS= read -r remote_ref; do
          branch="${remote_ref#refs/remotes/origin/}"

          if [[ "$branch" != "main" ]] && [[ ! "$branch" =~ ^v[1-9][0-9]*\.[0-9]+- ]]; then
            continue
          fi

          candidates=$((candidates + 1))
          branch_epoch="$(git -C "$repo_dir" log -1 --format=%ct "$remote_ref")"
          branch_iso="$(date -u -d "@$branch_epoch" '+%Y-%m-%dT%H:%M:%SZ')"

          if [[ "$branch_epoch" -ge "$cutoff_epoch" ]]; then
            echo "Changed: $branch (tip: $branch_iso)"
            echo "$branch" >> "$changed_file"
            changed=$((changed + 1))
          else
            echo "Unchanged: $branch (tip: $branch_iso)"
          fi
        done < <(git -C "$repo_dir" for-each-ref --format='%(refname)' refs/remotes/origin)

        echo "Evaluated $candidates candidate branch(es); $changed changed branch(es)."
        {
          echo "changed_branches<<EOF"
          cat "$changed_file"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Trigger DuckDB branch workflows (changed branches)
      if: ${{ fromJSON(steps.config.outputs.run_nightly) }}
      env:
        CHANGED_BRANCHES: ${{ steps.changed-branches.outputs.changed_branches }}
      run: |
        set -euo pipefail

        changed_branches="${CHANGED_BRANCHES:-}"

        if [[ -z "${changed_branches//[$'\t\r\n ']}" ]]; then
          echo "No eligible branch changed in the last 48 hours; skipping branch-scoped dispatches."
          exit 0
        fi

        while IFS= read -r branch; do
          [[ -z "$branch" ]] && continue
          echo "Dispatching branch-scoped workflows for $branch"
          ./trigger.sh duckdb "$(printf '{"ref":"refs/heads/%s"}' "$branch")" NightlyTests.yml
          ./trigger.sh duckdb "$(printf '{"ref":"refs/heads/%s"}' "$branch")" Main.yml
          if [[ "$branch" =~ ^v1\.[0-5]- ]]; then
            echo "Dispatching InvokeCI.yml for release branch family v1.0-*..v1.5-: $branch"
            ./trigger.sh duckdb "$(printf '{"ref":"refs/heads/%s","inputs":{"skip_tests":"false","git_ref":"%s","run_all":"true","twine_upload":"true"}}' "$branch" "$branch")" InvokeCI.yml
          else
            echo "Skipping InvokeCI.yml for $branch (allowed only for v1.0-*..v1.5- branches)"
          fi
        done <<< "$changed_branches"

    - name: Trigger non-gated workflows
      if: ${{ fromJSON(steps.config.outputs.run_nightly) }}
      run: |
        ./trigger.sh duckdb '{"ref": "refs/heads/main"}' IssuesCloseStale.yml
        ./trigger.sh duckdb '{"ref": "refs/heads/main"}' MirrorStalePRSubmittedIssues.yml
        ./trigger.sh ducklake '{"ref": "refs/heads/v1.4-andium"}' MainDistributionPipeline.yml
        #./trigger.sh duckdb '{"event_type": "nightly-build"}'

    - name: Trigger DuckDB-Wasm workflow (in duckdb)
      if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.trigger-nightly == 0 }}
      run: |
        ./trigger.sh duckdb '{"ref":"refs/heads/main","inputs":{"release_s3":"true", "duckdb-ref":"${{ github.event.inputs.duckdb-ref }}"}}' Wasm.yml
