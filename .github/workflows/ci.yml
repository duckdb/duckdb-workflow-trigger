name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Lint
        timeout-minutes: 10
        uses: duckdb/duckdb-ci/lint-ci@main

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Start MinIO
        run: make up

      - name: Run tests
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_REGION: us-east-1
          AWS_ENDPOINT_URL_S3: http://localhost:9000
          RELEASE_STATE_BUCKET: duckdb-release-state
          DRY_RUN_GITHUB: "true"
        run: make test

      - name: Run typecheck
        run: make typecheck
