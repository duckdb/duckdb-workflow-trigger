name: DuckDB Release Dispatch

on:
  workflow_dispatch:
    inputs:
      event:
        description: Release event phase
        required: true
        type: choice
        options:
          - core_ready
          - client_ready
      duckdb_version:
        description: Full DuckDB version
        required: true
        type: string
      duckdb_commit:
        description: Full DuckDB commit SHA
        required: true
        type: string
      status:
        description: Event status
        required: true
        type: choice
        options:
          - success
          - failure
          - skipped
      client:
        description: Client name, required for client_ready
        required: false
        type: string
      message:
        description: Optional debugging message, max 1000 characters
        required: false
        type: string
      source_workflow:
        description: Optional URL of the originating workflow
        required: false
        type: string
      source_run_id:
        description: Optional originating workflow run ID
        required: false
        type: string

concurrency:
  group: release-dispatch-${{ inputs.event }}-${{ inputs.duckdb_version }}-${{ inputs.client || 'core' }}
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      RELEASE_STATE_BUCKET: ${{ vars.RELEASE_STATE_BUCKET }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run dispatcher
        env:
          DISPATCH_EVENT: ${{ inputs.event }}
          DISPATCH_DUCKDB_VERSION: ${{ inputs.duckdb_version }}
          DISPATCH_DUCKDB_COMMIT: ${{ inputs.duckdb_commit }}
          DISPATCH_STATUS: ${{ inputs.status }}
          DISPATCH_CLIENT: ${{ inputs.client }}
          DISPATCH_MESSAGE: ${{ inputs.message }}
          DISPATCH_SOURCE_WORKFLOW: ${{ inputs.source_workflow }}
          DISPATCH_SOURCE_RUN_ID: ${{ inputs.source_run_id }}
        run: |
          set -euo pipefail

          uv run release-dispatcher \
            --event "$DISPATCH_EVENT" \
            --duckdb-version "$DISPATCH_DUCKDB_VERSION" \
            --duckdb-commit "$DISPATCH_DUCKDB_COMMIT" \
            --status "$DISPATCH_STATUS" \
            --client "$DISPATCH_CLIENT" \
            --message "$DISPATCH_MESSAGE" \
            --source-workflow "$DISPATCH_SOURCE_WORKFLOW" \
            --source-run-id "$DISPATCH_SOURCE_RUN_ID"
