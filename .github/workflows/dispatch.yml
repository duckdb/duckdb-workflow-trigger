name: DuckDB Release Dispatch

on:
  workflow_dispatch:
    inputs:
      event:
        description: Release event phase
        required: true
        type: choice
        options:
          - core_ready
          - client_ready
      duckdb_version:
        description: Full DuckDB version
        required: true
        type: string
      duckdb_commit:
        description: Full DuckDB commit SHA
        required: true
        type: string
      status:
        description: Event status
        required: true
        type: choice
        options:
          - success
          - failure
          - skipped
      client:
        description: Client name, required for client_ready
        required: false
        type: string
      message:
        description: Optional debugging message, max 1000 characters
        required: false
        type: string
      source_workflow:
        description: Optional URL of the originating workflow
        required: false
        type: string
      source_run_id:
        description: Optional originating workflow run ID
        required: false
        type: string

concurrency:
  group: release-dispatch-${{ inputs.event }}-${{ inputs.duckdb_version }}-${{ inputs.client || 'core' }}
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      RELEASE_STATE_BUCKET: ${{ vars.RELEASE_STATE_BUCKET }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run dispatcher
        run: |
          set -euo pipefail

          uv run release-dispatcher \
            --event "${{ inputs.event }}" \
            --duckdb-version "${{ inputs.duckdb_version }}" \
            --duckdb-commit "${{ inputs.duckdb_commit }}" \
            --status "${{ inputs.status }}" \
            --client "${{ inputs.client }}" \
            --message "${{ inputs.message }}" \
            --source-workflow "${{ inputs.source_workflow }}" \
            --source-run-id "${{ inputs.source_run_id }}"
