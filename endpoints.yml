hooks:
  # Trigger downstream workflows after DuckDB core release artifacts are ready.
  core_ready:
    python:
      # Format: owner/repo/workflow.yml@ref
      workflow: duckdb/duckdb-python/OnCoreReady.yml@main

  # Trigger client-specific workflows after a client release is ready.
  client_ready:
    r:
      # Format: owner/repo/workflow.yml@ref
      workflow: duckdb/duckdb-r/OnClientReady.yml@main
