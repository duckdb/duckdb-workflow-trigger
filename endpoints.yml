hooks:
  # Trigger downstream workflows after DuckDB core release artifacts are ready.
  core_ready:
    # Format: workflow: owner/repo/workflow.yml@ref
    - workflow: duckdb/duckdb-python/release.yml@main
      inputs:
        duckdb-sha: "{duckdb_commit}"
        pypi-index: prod
    - workflow: duckdb/duckdb-java/Vendor.yml@main
      inputs:
        duckdb-sha: "{duckdb_commit}"
    - workflow: duckdb/duckdb-odbc/Vendor.yml@main
      inputs:
        duckdb-sha: "{duckdb_commit}"

  # Trigger client-specific workflows after a client release is ready.
  client_ready:
    r:
      # Format: workflow: owner/repo/workflow.yml@ref
      - workflow: duckdb/duckdb-r/OnClientReady.yml@main
        inputs:
          - duckdb_version
          - duckdb_commit
          - payload
